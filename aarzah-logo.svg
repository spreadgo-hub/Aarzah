<svg viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="450" fill="#faf8f5"/>
  
  <!-- Decorative Floral Elements (Right side) -->
  <defs>
    <style>
      .flower-fill { fill: #c9a876; opacity: 0.7; }
      .leaf-fill { fill: #9b8b7e; opacity: 0.6; }
      .sparkle { fill: #d4c4a8; }
    </style>
  </defs>
  
  <!-- Decorative flower petals (top right corner) -->
  <g transform="translate(530, 90)">
    <!-- Main flower -->
    <circle cx="0" cy="-8" r="6" class="flower-fill"/>
    <circle cx="6" cy="-4" r="6" class="flower-fill"/>
    <circle cx="6" cy="4" r="6" class="flower-fill"/>
    <circle cx="0" cy="8" r="6" class="flower-fill"/>
    <circle cx="-6" cy="4" r="6" class="flower-fill"/>
    <circle cx="-6" cy="-4" r="6" class="flower-fill"/>
    <circle cx="0" cy="0" r="5" class="sparkle"/>
  </g>
  
  <!-- Decorative leaves -->
  <g transform="translate(500, 120)" stroke="#9b8b7e" stroke-width="2" fill="none">
    <path d="M 0 -15 Q 5 -8 8 0"/>
    <path d="M 0 -10 Q 6 -5 10 5"/>
    <path d="M 0 0 Q 8 5 15 12"/>
  </g>
  
  <!-- Connecting curve with leaves -->
  <g transform="translate(460, 70)" stroke="#c9a876" stroke-width="1" fill="none" opacity="0.5">
    <path d="M 0 0 Q 30 20 60 40"/>
  </g>
  
  <!-- Small sparkles -->
  <circle cx="490" cy="50" r="3" class="sparkle"/>
  <circle cx="550" cy="65" r="2" class="sparkle"/>
  <circle cx="530" cy="30" r="2.5" class="sparkle"/>
  
  <!-- Main Text: AARZAH -->
  <text x="200" y="240" font-family="Georgia, serif" font-size="92" font-weight="300" fill="#8b7d6f" letter-spacing="10" text-anchor="middle">AARZAH</text>
  
  <!-- Tagline: Aapki Aarzoo, hamari pehchaan -->
  <text x="200" y="310" font-family="Georgia, serif" font-size="28" font-style="italic" fill="#a09080" font-weight="300" text-anchor="middle" opacity="0.8">Aapki Aarzoo, hamari pehchaan</text>
  
  <!-- Decorative line/flourish -->
  <line x1="50" y1="210" x2="350" y2="210" stroke="#d4c4a8" stroke-width="2" opacity="0.6"/>
</svg>