  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const searchInput = document.getElementById('searchInput');
      const recentList = document.getElementById('recentList');
      const recentSearches = JSON.parse(localStorage.getItem('aarzah_recent_searches') || '[]');
      
      // Display recent searches
      if(recentSearches.length > 0) {
        recentList.innerHTML = recentSearches.map((search) => `
          <div onclick="performSearch('${search}')" style="padding:12px;background:#f5f5f5;border-radius:4px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:14px">🔍 ${search}</span>
            <span style="color:#999;font-size:12px">×</span>
          </div>
        `).join('');
      } else {
        recentList.innerHTML = '<p style="color:#999;font-size:13px">No recent searches</p>';
      }

      // Search on Enter
      searchInput.addEventListener('keypress', function(e) {
        if(e.key === 'Enter') {
          performSearch(searchInput.value);
        }
      });

      // Focus on search input
      searchInput.focus();
    });
  </script>
